<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario</title>
    <!-- Enlace a Bootstrap para el diseño responsivo (Semana 4) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <!-- Formulario de Registro -->
        <div class="col-md-5 bg-white p-4 rounded shadow-sm">
            <h3 class="mb-4">Ingresar Producto</h3>
            
            <div id="mensajeAlerta" class="alert d-none" role="alert"></div>

            <form id="formularioRegistro">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre del Producto</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ej. Gomitas Sottcor / Blusa Temu">
                </div>
                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripción</label>
                    <textarea class="form-control" id="descripcion" rows="2" placeholder="Tallas, detalles, etc."></textarea>
                </div>
                <div class="mb-3">
                    <label for="categoria" class="form-label">Categoría</label>
                    <select class="form-select" id="categoria">
                        <option value="">Seleccione una opción...</option>
                        <option value="Suplementos">Suplementos</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Guardar Registro</button>
            </form>
        </div>

        <!-- Lista de Resultados -->
        <div class="col-md-7 mt-4 mt-md-0">
            <div class="bg-white p-4 rounded shadow-sm h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>Inventario Actual</h3>
                    <span class="badge bg-success fs-6">Total: <span id="contadorRegistros">0</span></span>
                </div>
                
                <ul id="listaElementos" class="list-group">
                    <!-- Los productos se agregarán aquí con JavaScript -->
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Enlace al archivo JavaScript (Semana 5) -->
<script src="script.js"></script>
</body>
</html>
